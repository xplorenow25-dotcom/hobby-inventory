<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobby Vault UI Mockup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="phone-container">
        
        <div class="app-screen">
            
            <header class="app-header">
                <div class="user-greeting">
                    <h1>Welcome back, <span class="accent-cyan">Alex!</span></h1>
                    <p class="current-date">October 12, 2025</p>
                </div>
                <img src="profile_pic.png" alt="Profile Picture" class="profile-pic">
            </header>

            <div class="search-container">
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="Search your vault..." class="search-bar-input">
    </div>
</div>
            <div class="portfolio-card">
                <div class="card-content">
                    <p class="portfolio-title">Overall Portfolio Value</p>
                    <div class="portfolio-value-container">
                        <span class="currency">$</span>
                        <span class="value">15,750.00</span>
                        <div class="value-change change-positive">
                            <i class="fas fa-arrow-up"></i>
                            <span class="change-percent">3.2%</span>
                        </div>
                    </div>
                    <div class="portfolio-graph">
                        <div class="graph-bar bar-1"></div>
                        <div class="graph-bar bar-2"></div>
                        <div class="graph-bar bar-3"></div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-solid">Add Item</button>
                        <button class="btn btn-primary btn-outline">Scan Receipt</button>
                    </div>
                </div>
            </div>

            <nav class="category-filter">
                <button class="filter-pill pill-active">
                    <i class="fas fa-layer-group pill-icon"></i>
                    All (52)
                </button>
                <button class="filter-pill">
                    <i class="fas fa-shoe-prints pill-icon"></i>
                    Shoes (18)
                </button>
                <button class="filter-pill">
                    <i class="fas fa-gamepad pill-icon"></i>
                    Games (15)
                </button>
                <button class="filter-pill">
                    <i class="fas fa-paw pill-icon"></i>
                    Pets (2)
                </button>
            </nav>

            <section class="recent-additions">
                <h2>RECENT ADDITIONS</h2>
                <div class="additions-grid">
                    
                    <div class="item-card">
                        <div class="item-image-container">
                            <img src="image2.png" alt="Nike Jordan 1 Retro" class="item-image">
                        </div>
                        <div class="item-details">
                            <h3>Nike Jordan 1 Retro</h3>
                            <p class="item-price">$450.00</p>
                            <p class="item-date">Purchased Oct '25</p>
                        </div>
                    </div>

                    <div class="item-card">
                        <div class="item-image-container">
                            <img src="image1.jpg" alt="PS5 Console" class="item-image">
                        </div>
                        <div class="item-details">
                            <h3>PS5 Console</h3>
                            <p class="item-price">$500.00</p>
                            <p class="item-date">Purchased Nov '25</p>
                        </div>
                    </div>

                    <div class="item-card">
                        <div class="item-image-container">
                            <img src="image3.png" alt="Simba the Dog" class="item-image pet-image">
                        </div>
                        <div class="item-details">
                            <h3>Simba</h3>
                            <p class="item-price">Age: 2 yrs</p>
                            <p class="item-date">&nbsp;</p> </div>
                    </div>

                    <div class="item-card">
                        <div class="item-image-container">
                            <img src="image4.png" alt="Vintage Vinyl Record" class="item-image">
                        </div>
                        <div class="item-details">
                            <h3>Vintage Vinyl Record</h3>
                            <p class="item-price">$120.00</p>
                            <p class="item-date">Purchased Dec '25</p>
                        </div>
                    </div>

                </div>
            </section>

        </div> <footer class="bottom-nav">
            <a href="#" class="nav-item nav-active">
                <i class="fas fa-home nav-icon"></i>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-search nav-icon"></i>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-chart-line nav-icon"></i>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-user-circle nav-icon"></i>
            </a>
        </footer>
              <script src="script.js"></script>
    </div> </body>
</html>
